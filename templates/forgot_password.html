<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | EarthScape</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        :root { --green: #2E7D32; }

        body {
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .signup-card {
            width: 1100px;
            max-height: 90vh;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: row;
        }

        .form-panel {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .video-panel {
            flex: 1;
            margin-top: 50px;
            margin-left: 25px;
            position: relative;
            overflow: hidden;
        }

        .video-panel video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .login-logo {
            max-width: 300px;
            height: auto;
            margin: -80px auto -50px;
            display: block;
        }

        .form-panel h2 {
            margin-bottom: 10px;
            text-align: center;
            color: var(--green);
        }

        .form-control {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 0.25rem rgba(46, 125, 50, 0.15);
        }

        .btn-green {
            width: 100%;
            padding: 12px;
            background-color: var(--green);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-green:hover { background-color: #256a2a; color: white; }

        /* Smooth Transition Animation */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .video-panel { display: none; }
            .signup-card { width: 95%; }
        }
        .password-field-container {
    position: relative;
}
.toggle-password {
    transition: color 0.2s ease;
}
.toggle-password:hover {
    color: var(--green); /* Turns green when you hover over the eye */
}
::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #e8f5e9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #2E7D32; border-radius: 10px; border: 2px solid #e8f5e9; }
        ::-webkit-scrollbar-thumb:hover { background: #1B5E20; }
    </style>
</head>

<body>

    <div class="signup-card">
        <div class="form-panel fade-in">
            <img src="static/images/textedlogo.png" alt="EarthScape Logo" class="login-logo">
            
            <h2 class="fw-bold">Account Recovery</h2>

            {% if not user_found %}
            <form method="POST" class="fade-in">
                <p class="text-muted text-center small mb-4">Enter your username to begin recovery.</p>
                <div class="mb-4">
                    <label class="form-label small fw-bold"  >Username</label>
                    <input type="text" name="username" autocomplete="off" class="form-control" placeholder="Your username" required>
                </div>
                <button type="submit" name="action" value="find_user" class="btn btn-green">CONTINUE <i class="bi bi-arrow-right ms-2"></i></button>
            </form>
            {% else %}
            <form method="POST" class="fade-in">
                <input type="hidden" name="username" value="{{ user_data.username }}">
                
                <div class="mb-3 p-3 bg-light rounded border-start border-4 border-success">
                    <label class="form-label small fw-bold text-uppercase text-muted" style="letter-spacing: 1px;">Security Question</label>
                    <p class="mb-0 fw-bold">{{ user_data.security_question }}</p>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold" >Your Secret Answer</label>
                    <input type="text" name="answer" class="form-control" placeholder="Type answer here" autocomplete="off" required>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold">Set New Password</label>
                    <div class="position-relative">
                        <input type="password" name="new_password" class="form-control" 
                            placeholder="••••••••" autocomplete="off" required 
                            style="padding-right: 40px;">
                        
                        <i class="bi bi-eye-slash toggle-password" 
                        style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; z-index: 10;"></i>
                    </div>
                </div>

                <button type="submit" name="action" value="reset_password" class="btn btn-green">RESET PASSWORD</button>
            </form>
            {% endif %}

            <div class="text-center mt-3">
                <a href="{{ url_for('auth.login') }}" class="text-decoration-none small text-muted">
                    Remembered it? <span class="fw-bold" style="color: var(--green);">Back to Login</span>
                </a>
            </div>
        </div>

        <div class="video-panel">
            <video autoplay muted loop playsinline>
                <source src="{{ url_for('static', filename='images/forgetpass.webm') }}" type="video/webm">
            </video>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
                    document.querySelectorAll('.toggle-password').forEach(icon => {
                    icon.addEventListener('click', function() {
                        // Finds the input field right before the icon
                        const passwordInput = this.previousElementSibling;
                        
                        if (passwordInput.type === 'password') {
                            passwordInput.type = 'text';
                            this.classList.replace('bi-eye-slash', 'bi-eye');
                        } else {
                            passwordInput.type = 'password';
                            this.classList.replace('bi-eye', 'bi-eye-slash');
                        }
                    });
                });
    </script>

</body>
</html>
