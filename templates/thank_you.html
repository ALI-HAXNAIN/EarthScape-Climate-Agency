<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - EarthScape</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f4f7f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .success-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 95%; /* Responsive width */
        }
        .success-card .row {
    display: flex;
    align-items: stretch; /* This makes both columns equal height */
}
        .animation-side {
            background: #e8f5e9;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0px;
            /* min-height: 100px; */
        }
        /* This keeps the video from exploding outside the box */
        .animation-side video {
    width: 100%;
    height: 100%;
    object-fit: cover; /* This makes the video fill the container like a background */
}
        .content-side {
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .btn-green {
            background-color: #2E7D32;
            color: white;
            padding: 12px 30px;
            border-radius: 10px;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-green:hover {
            background-color: #1e5221;
            color: white;
            transform: translateY(-2px);
        }
        .status-badge {
            display: inline-block;
            background-color: #C8E6C9;
            color: #2E7D32;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="success-card">
        <div class="row g-0 d-flex align-items-stretch">
            
            <div class="col-md-5 animation-side">
                <video autoplay muted loop playsinline>
                    <source src="{{ url_for('static', filename='images/feedback.webm') }}" type="video/webm">
                    Your browser does not support the video tag.
                </video>            
            </div>

            <div class="col-md-7 content-side text-center text-md-start">
                <div>
                    <span class="status-badge">
                        <i class="bi bi-check-circle-fill me-1"></i> Submitted Successfully
                    </span>
                </div>
                <h2 class="fw-bold mb-3">Feedback Received!</h2>
                <p class="text-muted mb-4" style="line-height: 1.8;">
                    Thank you for contributing to a greener future! Your insights have been received and are being analyzed by our climate experts. Together, we are making data-driven sustainability a reality.
                </p>
                <div>
                    <a href="{{ url_for('main.userdashboard') }}" class="btn btn-green fw-bold">
                        <i class="bi bi-house-door-fill me-2"></i> Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
