<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Analytics | EarthScape</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        :root {
            --earth-green: #2E7D32;
            --sidebar-dark: #121412;
            --sidebar-width: 250px;
        }

        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', sans-serif;
        }

        #sidebar-wrapper {
            min-height: 100vh;
            width: var(--sidebar-width);
            background-color: var(--sidebar-dark);
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        #page-content-wrapper {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            min-height: 100vh;
        }

        .nav-link-custom {
            color: rgba(255, 255, 255, 0.6);
            padding: 12px 25px;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: 0.2s;
            border-left: 4px solid transparent;
            font-size: 0.95rem;
        }

        .nav-link-custom i {
            font-size: 1.2rem;
            width: 30px;
        }

        .nav-link-custom:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .nav-link-custom.active {
            background: rgba(46, 125, 50, 0.15);
            color: white;
            border-left: 4px solid var(--earth-green);
        }

        .logout-link {
            margin-top: auto;
            margin-bottom: 20px;
            color: #ff4d4d !important;
        }

        .tool-card,
        .plot-container {
            border: none;
            border-radius: 15px;
            background: white;
        }

        .sidebar-logo {
            width: 100px;
            height: auto;
            margin-bottom: 10px;
        }

        .sidebar-brand {
            height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .summary-card {
            border-radius: 15px;
            border: none;
            transition: transform 0.3s;
        }
        
        .summary-card:hover {
            transform: translateY(-5px);
        }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #e8f5e9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #2E7D32; border-radius: 10px; border: 2px solid #e8f5e9; }
        ::-webkit-scrollbar-thumb:hover { background: #1B5E20; }
    </style>
</head>

<body>
    <div class="d-flex" id="wrapper">
        <div id="sidebar-wrapper" class="shadow">
            <div class="sidebar-brand">
                <img class="sidebar-logo" src="{{ url_for('static', filename='images/whitelogo.png') }}" alt="Logo">
                <h4 class="text-white fw-bold mb-0" style="letter-spacing: 1px;">EarthScape</h4>
                <small class="text-white-50 text-uppercase" style="font-size: 0.65rem; letter-spacing: 2px;">Climate Agency</small>
            </div>

            <nav class="mt-3 flex-grow-1">
                <a href="{{ url_for('main.userdashboard') }}" class="nav-link-custom {% if request.endpoint == 'main.userdashboard' %}active{% endif %}">
                    <i class="bi bi-grid-1x2-fill"></i> <span>Dashboard</span>
                </a>
                <a href="{{ url_for('main.visualization') }}" class="nav-link-custom {% if request.endpoint == 'main.visualization' %}active{% endif %}">
                    <i class="bi bi-graph-up-arrow"></i> <span>Analytics</span>
                </a>
                <a href="{{ url_for('main.predict') }}" class="nav-link-custom {% if request.endpoint == 'main.predict' %}active{% endif %}">
                    <i class="bi bi-cpu-fill"></i> <span>Predictions</span>
                </a>
                <a href="{{ url_for('notifications.view_notifications') }}" class="nav-link-custom {% if request.endpoint == 'notifications.view_notifications' %}active{% endif %}">
                    <i class="bi bi-bell-fill"></i> <span>Notifications</span>
                </a>
                <a href="{{ url_for('feedback.submit_feedback') }}" class="nav-link-custom {% if request.endpoint == 'feedback.submit_feedback' %}active{% endif %}">
                    <i class="bi bi-chat-dots-fill"></i> <span>Feedback</span>
                </a>
            </nav>

            <div class="border-top border-secondary mx-4 opacity-10"></div>
            <a href="{{ url_for('auth.logout') }}" class="nav-link-custom logout-link">
                <i class="bi bi-power"></i> <span>Logout</span>
            </a>
        </div>

        <div id="page-content-wrapper">
    <nav class="navbar navbar-light bg-white py-3 px-4 shadow-sm">
        <h5 class="m-0 fw-bold"><i class="bi bi-bar-chart-line text-success me-2"></i>Data Visualization Studio</h5>
    </nav>

    <div class="container-fluid p-4">
        <div class="card tool-card shadow-sm p-4 mb-4">
            <h6 class="fw-bold mb-3 text-uppercase text-muted small">Visual Controls</h6>
            <form method="POST" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label small fw-bold">Analysis Mode</label>
                    <select name="action" class="form-select" id="actionSelect" onchange="toggleInputs()">
                        <option value="single">Single Variable Trend</option>
                        <option value="correlation">Correlation Matrix</option>
                        <option value="multi">Multi-Variable Comparison</option>
                    </select>
                </div>

                <div class="col-md-4" id="singleInput">
                    <label class="form-label small fw-bold">Select Variable</label>
                    <select name="variable" class="form-select">
                        {% for c in cols %}
                        <option value="{{c}}">{{c|replace('_', ' ')|capitalize}}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4" id="multiInput" style="display:none;">
                    <label class="form-label small fw-bold">Variables (Hold Ctrl)</label>
                    <select name="variables" class="form-select" multiple size="1">
                        {% for c in cols %}
                        <option value="{{c}}">{{c|replace('_', ' ')|capitalize}}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4">
                    <button type="submit" class="btn btn-success w-100 fw-bold">
                        <i class="bi bi-play-fill me-1"></i> GENERATE PLOT
                    </button>
                </div>
            </form>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card plot-container shadow-sm p-3 d-flex align-items-center justify-content-center" style="min-height: 500px;">
                    {% if plot_url %}
                    <img src="data:image/png;base64,{{ plot_url }}" class="img-fluid rounded">
                    {% else %}
                    <div class="text-muted text-center">
                        <i class="bi bi-graph-up display-1 opacity-25"></i>
                        <p class="mt-3">Select parameters above and click generate to view historical data trends</p>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
    </div>

    <script>
        // Dropdown Toggle Logic
        function toggleInputs() {
            const action = document.getElementById('actionSelect').value;
            document.getElementById('singleInput').style.display = (action === 'single') ? 'block' : 'none';
            document.getElementById('multiInput').style.display = (action === 'multi') ? 'block' : 'none';
        }

        // Counter Animation Logic
        document.addEventListener("DOMContentLoaded", () => {
            const counters = document.querySelectorAll('.counter');
            const speed = 100;

            counters.forEach(counter => {
                const updateCount = () => {
                    const target = parseFloat(counter.getAttribute('data-target'));
                    const count = parseFloat(counter.innerText);
                    const increment = target / speed;

                    if (count < target) {
                        counter.innerText = (count + increment).toFixed(2);
                        setTimeout(updateCount, 15);
                    } else {
                        counter.innerText = target;
                    }
                };
                
                if (!isNaN(parseFloat(counter.getAttribute('data-target')))) {
                    updateCount();
                }
            });
        });
    </script>
</body>

</html>
