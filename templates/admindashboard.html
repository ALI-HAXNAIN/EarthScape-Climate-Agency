<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard | EarthScape</title>
    <style>
        body {
            margin: 0;
            background: #F5F5DC;
            font-family: Arial, sans-serif;
            color: #333;
        }
        header {
            background: #2E7D32;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            padding: 40px;
            text-align: center;
        }
        .card {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .btn {
            display: inline-block;
            padding: 12px 20px;
            background: #8D6E63;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Admin Dashboard</h1>
    <p>EarthScape Climate Agency</p>
</header>

<div class="container">
    <div class="card">
        <h2>Welcome, Admin 👋</h2>
        <p>
            From here you can manage data, users, and system settings
            for the EarthScape Climate Agency platform.
        </p>
        <a class="btn" href="/logout">Logout</a>
    </div>
</div>

</body>
</html>
