<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EarthScape</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        :root {
            --green: #2E7D32;
            --blue: #0288D1;
        }

        /* Full viewport centering */
        body {
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
            height: 100vh;
            /* lock to viewport height */
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* prevent scroll */
        }

        .login-card {
            width: 1100px;
            /* balanced width */
            max-height: 90vh;
            /* card never taller than viewport */
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: row;
        }

        /* Left image panel */
        .image-panel {
            flex: 1;
            background-size: contain;
            margin-top: 50px;
            margin-left: 25px;
            background-position: center;
        }

        /* Right form panel */
        .form-panel {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Logo above Welcome Back */
        .login-logo {
            max-width: 300px;
            /* good size for balance */
            height: auto;
            margin: -100px auto -50px;
            /* small gap below logo */
            display: block;
        }

        /* Headings spacing */
        .form-panel h2 {
            margin-top: -30px;
            margin-bottom: 6px;
            /* tighter gap */
            text-align: center;
        }

        .form-panel p {
            margin-bottom: 12px;
            /* smaller gap before form */
            text-align: center;
        }

        /* Form controls */
        .form-control {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 0.25rem rgba(46, 125, 50, 0.25);
        }

        /* Buttons */
        .btn-green {
            background-color: var(--green);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
        }

        .btn-green:hover {
            background-color: #256a2a;
            color: #fff;
        }

        .text-green {
            color: var(--green) !important;
        }

        .text-blue {
            color: var(--blue) !important;
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            .image-panel {
                display: none;
            }

            .form-panel {
                padding: 25px;
            }

            .login-card {
                width: 95%;
            }
        }
        .toggle-password {
    cursor: pointer;
}
.pass-input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 0.25rem rgba(46, 125, 50, 0.25);
}
    </style>
</head>

<body>

    <div class="login-card">
        <!-- Left image -->
        <div class="image-panel">
            <video autoplay muted loop playsinline>
                <source src="static/images/Login.webm" type="video/webm">
            </video>
        </div>

        <!-- Right form -->
        <div class="form-panel">
            <img src="static/images/textedlogo.png" alt="EarthScape Logo" class="login-logo">

            <h2 class="fw-bold text-green mb-0">Welcome Back</h2>
            <p class="lead small text-muted">Login Your Account</p>

            <form method="post">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Username</label>
                    <input type="text" class="form-control" name="username" placeholder="Enter username" autocomplete="off" required>
                </div>
                <div class="mb-3 password-field-container">
                    <label class="form-label small fw-bold">Password</label>
                    <div class="position-relative">
                        <input type="password" class="form-control pass-input" id="password" name="password" 
                            placeholder="••••••••" required autocomplete="off" style="padding-right: 40px;">
                        
                        <i class="bi bi-eye-slash toggle-password" 
                        style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; z-index: 10;"></i>
                    </div>
                </div>

                <div class="d-grid mb-4">
                    <button type="submit" class="btn btn-green">Secure Login</button>
                </div>
            </form>

            <a href="/signup" class="text-center text-dark text-decoration-none">
                Don't have an account?
                <span class="fw-bold text-green ms-2">Create new account</span>
            </a>

            <div class="text-center mt-2">
                <a href="{{ url_for('auth.forgot_password') }}" class="text-muted small text-decoration-none">Forgot Password?</a>
            </div>        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.toggle-password').forEach(icon => {
    icon.addEventListener('click', function() {
        // This finds the input that is in the same div as the eye icon
        const passwordInput = this.previousElementSibling;
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            this.classList.replace('bi-eye-slash', 'bi-eye');
        } else {
            passwordInput.type = 'password';
            this.classList.replace('bi-eye', 'bi-eye-slash');
        }
    });
});
    </script>
</body>

</html>
