<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | EarthScape</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        :root {
            --green: #2E7D32;
            --blue: #0288D1;
        }

        /* Full viewport centering - COPIED FROM LOGIN PAGE */
        body {
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .signup-card {
            /* Using a generic class name for consistency */
            width: 1100px;
            /* COPIED FROM LOGIN PAGE */
            max-height: 90vh;
            /* COPIED FROM LOGIN PAGE */
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: row;
        }

        /* Video/Image Panel - NOW ON THE RIGHT */
        .video-panel {
            flex: 1;
            /* COPIED from your Login image-panel for size/position */
            background-size: contain;
            margin-top: 50px;
            margin-left: 25px;
            background-position: center;
            position: relative;
            overflow: hidden;
        }

        .video-panel video {
            /* Styling for the video to fit */
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Form Panel - NOW ON THE LEFT */
        .form-panel {
            flex: 1;
            padding: 40px;
            /* COPIED FROM LOGIN PAGE */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Logo styling - COPIED FROM LOGIN PAGE */
        .login-logo {
            max-width: 300px;
            height: auto;
            margin: -100px auto -40px;
            display: block;
        }

        /* Headings spacing - COPIED FROM LOGIN PAGE */
        .form-panel h2 {
            margin-top: -40px;
            margin-bottom: 6px;
            text-align: center;
            color: var(--green);
        }

        .form-panel p {
            margin-bottom: -5px;
            text-align: center;
        }

        /* Form controls - COPIED FROM LOGIN PAGE */
        .form-control {
            padding: 12px;
            border-radius: 8px;
            /* Consistent border-radius */
            border: 1px solid #ddd;
            transition: border-color 0.3s;
            width: 100%;
        }

        .form-control:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 0.25rem rgba(46, 125, 50, 0.25);
        }

        /* Buttons - COPIED FROM LOGIN PAGE */
        .btn-green {
            width: 100%;
            /* Ensure full width */
            padding: 12px;
            background-color: var(--green);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-green:hover {
            background-color: #256a2a;
        }

        /* Link Styling - COPIED FROM LOGIN PAGE */
        .text-green {
            color: var(--green) !important;
        }

        .text-dark {
            color: #212529 !important;
        }

        .form-panel a {
            text-align: center;
            margin-top: 10px;
            /* Reduced margin for tighter fit */
            text-decoration: none;
            font-size: 14px;
        }

        /* Mobile adjustments - COPIED FROM LOGIN PAGE */
        @media (max-width: 768px) {
            .video-panel {
                display: none;
            }

            .form-panel {
                padding: 25px;
            }

            .signup-card {
                width: 95%;
            }

            /* Password fields stack on mobile */
            .password-row .col-md-6 {
                width: 100%;
            }
        }
        .password-field-container {
    position: relative;
}
.toggle-password {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #666;
    z-index: 10;
}
.form-control {
    padding-right: 40px; /* Make space so text doesn't hide under the eye */
}
    </style>
</head>

<body>

    <div class="signup-card">

        <div class="form-panel">
            <img src="static/images/textedlogo.png" alt="EarthScape Logo" class="login-logo">

            <h2 class="fw-bold text-green mb-0">Join EarthScape</h2>

            <form id="signupForm" method="post"> <div class="mb-3">
                    <label for="username" class="form-label small fw-bold">Username</label>
                    <input type="text" class="form-control" id="username" name="username"
                        placeholder="Choose a username" autocomplete="off" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label small fw-bold">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="you@earthscape.org" autocomplete="off"
                        required>
                </div>

                <div class="row password-row mb-3 gx-3">
                    <div class="col-md-6">
                        <label for="password" class="form-label small fw-bold">Password</label>
                        <div class="position-relative">
                            <input type="password" class="form-control" id="password" name="password" 
                                placeholder="••••••••" autocomplete="off" required style="padding-right: 40px;">
                            <i class="bi bi-eye-slash toggle-password" 
                            style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; z-index: 10;"></i>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="confirm_password" class="form-label small fw-bold">Confirm Password</label>
                        <div class="position-relative">
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                                placeholder="••••••••" autocomplete="off" required style="padding-right: 40px;">
                            <i class="bi bi-eye-slash toggle-password" 
                            style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; z-index: 10;"></i>
                        </div>
                    </div>
                </div>

                <input type="hidden" name="security_question" id="hidden_q">
                <input type="hidden" name="security_answer" id="hidden_a">

                <div class="d-grid mb-3">
                    <button type="button" class="btn btn-green" onclick="showSecurityModal()">Create Account</button>
                </div>
            </form>

            <a href="/login" class="text-center text-dark">
                Already have an account?
                <span class="fw-bold text-green ms-2">Login Here</span>
            </a>
        </div>

        

        <div class="video-panel">
            <video autoplay muted loop playsinline>
                <source src="{{ url_for('static', filename='images/username.webm') }}" type="video/webm">
            </video>
        </div>

    </div>

    <div class="modal fade" id="securityModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-green"><i class="bi bi-shield-lock-fill me-2"></i>Secure Your Account</h5>
                </div>
                <div class="modal-body">
                    <p class="text-muted small">In case you forget your password, a secret question helps verify your identity.</p>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Secret Question</label>
                        <select class="form-select" id="modal_q">
                            <option value="What was the name of your first pet?">What was the name of your first pet?</option>
                            <option value="What city were you born in?">What city were you born in?</option>
                            <option value="What was the model of your first car?">What was the model of your first car?</option>
                            <option value="What is your favorite book?">What is your favorite book?</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Your Secret Answer</label>
                        <input type="text" class="form-control" id="modal_a" placeholder="Enter your answer">
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" onclick="submitRegistration()" class="btn btn-green px-4">Complete Registration</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Use the Bootstrap Modal constructor
        function showSecurityModal() {
            var myModal = new bootstrap.Modal(document.getElementById('securityModal'));
            myModal.show();
        }

        function submitRegistration() {
            const qValue = document.getElementById('modal_q').value;
            const aValue = document.getElementById('modal_a').value;

            if (!aValue.trim()) {
                alert("Please provide an answer.");
                return;
            }

            // Transfer data to hidden inputs
            document.getElementById('hidden_q').value = qValue;
            document.getElementById('hidden_a').value = aValue;

            // Submit the form
            document.getElementById('signupForm').submit();
        }

         document.querySelectorAll('.toggle-password').forEach(icon => {
                        icon.addEventListener('click', function() {
                    // Find the input field relative to the clicked icon
                    const input = this.parentElement.querySelector('input');
                    
                    if (input.type === 'password') {
                        input.type = 'text';
                        this.classList.replace('bi-eye-slash', 'bi-eye');
                    } else {
                        input.type = 'password';
                        this.classList.replace('bi-eye', 'bi-eye-slash');
                    }
                });
            });
    </script>
</body>

</html>
